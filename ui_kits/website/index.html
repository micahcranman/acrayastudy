<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Acraya — Sanctuaries for Spiritual Wanderers</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="icon" type="image/svg+xml" href="../../assets/sphere-mark.svg">
  <style>
    html, body { margin: 0; padding: 0; background: #000; color: #fff; overflow-x: hidden; }
    * { box-sizing: border-box; }
    /* image-slot host customization */
    image-slot {
      --imgslot-bg: rgba(255,255,255,0.04);
      --imgslot-border: 1px dashed rgba(255,255,255,0.25);
      --imgslot-fg: rgba(255,255,255,0.45);
      --imgslot-placeholder-size: 11px;
      --imgslot-placeholder-tracking: 0.2em;
    }
    .acraya-light image-slot {
      --imgslot-bg: rgba(0,0,0,0.04);
      --imgslot-border: 1px dashed rgba(0,0,0,0.25);
      --imgslot-fg: rgba(0,0,0,0.45);
    }
    /* Hide horizontal scrollbar gutter */
    body::-webkit-scrollbar { width: 0; }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Web component for image slots -->
  <script src="image-slot.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Sphere.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="ImageFrame.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="PracticeSection.jsx"></script>
  <script type="text/babel" src="Intro.jsx"></script>
  <script type="text/babel" src="SanctuariesGrid.jsx"></script>
  <script type="text/babel" src="LocationDetail.jsx"></script>
  <script type="text/babel" src="Reserve.jsx"></script>

  <script type="text/babel">
    function App() {
      const reserveRef = React.useRef(null);
      const goReserve = () => {
        const el = document.getElementById('reserve');
        if (el) window.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' });
      };
      return (
        <div id="top">
          <Nav onReserve={goReserve} />
          <Hero />
          <PracticeSection />
          <Intro />
          <SanctuariesGrid />
          <LocationDetail />
          <Reserve reserveRef={reserveRef} />
          <footer style={{
            background: '#000', color: 'rgba(255,255,255,0.45)',
            padding: '48px 64px',
            borderTop: '1px solid rgba(255,255,255,0.08)',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            fontFamily: 'Jost, sans-serif', fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
          }}>
            <span>© Acraya · MMXXVI</span>
            <span>Sanctuaries for Spiritual Wanderers</span>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
