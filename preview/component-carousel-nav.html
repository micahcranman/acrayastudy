<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  :root { --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1); --dur: 320ms; }
  .car-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: #000; border: 1px solid rgba(255,255,255,0.5);
    color: #fff; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background var(--dur) var(--ease-out),
                border-color var(--dur) var(--ease-out),
                color var(--dur) var(--ease-out),
                opacity 150ms var(--ease-out);
  }
  .car-btn:hover { background: #fff; color: #000; border-color: #fff; }
  .car-btn:active { opacity: 0.6; }

  /* arrow icon nudges with the cursor */
  .car-btn svg { transition: transform var(--dur) var(--ease-out); }
  .car-btn.prev:hover svg { transform: translateX(-2px); }
  .car-btn.next:hover svg { transform: translateX(2px); }

  /* dots clickable */
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: none; cursor: pointer; padding: 0;
    transition: background var(--dur) var(--ease-out), width var(--dur) var(--ease-out), opacity 150ms var(--ease-out);
  }
  .dot:hover { background: rgba(255,255,255,0.6); }
  .dot.active {
    width: 16px;
    background: #fff;
    border-radius: 3px;
  }
  .dot.active:hover { background: #fff; opacity: 0.85; }
</style>
<script>
  function setActive(i){
    document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === i));
  }
</script>
</head>
<body><div class="card" style="padding:32px;">
  <div class="eyebrow" style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.22em; text-transform:uppercase; opacity:.55;">Carousel controls · hover me</div>
  <div style="display:flex; gap:24px; align-items:center; justify-content:center; padding:18px 0;">
    <button class="car-btn prev" aria-label="Previous">
      <svg width="18" height="18" stroke="currentColor" stroke-width="1.25" fill="none" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
    <button class="car-btn next" aria-label="Next">
      <svg width="18" height="18" stroke="currentColor" stroke-width="1.25" fill="none" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>
    <div style="width:1px; height:36px; background:rgba(255,255,255,.18);"></div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="dot" onclick="setActive(0)" aria-label="Slide 1"></button>
      <button class="dot" onclick="setActive(1)" aria-label="Slide 2"></button>
      <button class="dot active" onclick="setActive(2)" aria-label="Slide 3"></button>
      <button class="dot" onclick="setActive(3)" aria-label="Slide 4"></button>
      <button class="dot" onclick="setActive(4)" aria-label="Slide 5"></button>
    </div>
  </div>
  <div style="font-family:'Inter',sans-serif; font-size:11px; opacity:.55; color:#fff; text-align:center;">48px circle · 1.25px chevron · arrow nudges + button inverts on hover · click dots to set active</div>
</div></body></html>
