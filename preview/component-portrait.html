<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card light" style="color:#000; padding:32px;">
  <div class="eyebrow" style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.22em; text-transform:uppercase; opacity:.5;">Portrait crops · black & white</div>
  <div style="display:flex; gap:28px; align-items:center; justify-content:center; padding:8px 0;">
    <div style="width:140px; height:140px; border-radius:50%; overflow:hidden; background:linear-gradient(135deg, #2a2a2a 0%, #6a6a6a 60%, #1a1a1a 100%); display:flex; align-items:flex-end; justify-content:center; filter:grayscale(1) contrast(1.05);">
      <div style="width:60px; height:80px; background:radial-gradient(ellipse at 50% 30%, #d4d4d4 0%, #6a6a6a 60%, #1a1a1a 100%); border-radius:30px 30px 0 0; margin-bottom:0;"></div>
    </div>
    <div style="width:110px; height:110px; border-radius:50%; overflow:hidden; background:linear-gradient(160deg, #3a3a3a 0%, #777 50%, #222 100%); display:flex; align-items:flex-end; justify-content:center; filter:grayscale(1) contrast(1.05);">
      <div style="width:50px; height:64px; background:radial-gradient(ellipse at 50% 30%, #c8c8c8 0%, #5a5a5a 60%, #1a1a1a 100%); border-radius:25px 25px 0 0;"></div>
    </div>
    <div style="width:160px; height:160px; border-radius:50%; overflow:hidden; background:linear-gradient(180deg, #888 0%, #444 50%, #1a1a1a 100%); display:flex; align-items:flex-end; justify-content:center; filter:grayscale(1) contrast(1.05);">
      <div style="width:72px; height:96px; background:radial-gradient(ellipse at 50% 30%, #d4d4d4 0%, #6a6a6a 60%, #1a1a1a 100%); border-radius:36px 36px 0 0;"></div>
    </div>
  </div>
  <div style="font-family:'Inter',sans-serif; font-size:11px; opacity:.55; text-align:center;">Documentary B&W portraits · circular crops · staggered scale + offset positioning</div>
</div></body></html>
