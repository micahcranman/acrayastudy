<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="font-family:'Jost', sans-serif; font-size:11px; letter-spacing:.22em; text-transform:uppercase; opacity:.55;">Semantic · Dark mode</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; color:#fff;">
    <div>
      <div style="height:64px; background:#000; border:1px solid rgba(255,255,255,.1);"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--bg</div>
      <div class="mono" style="font-size:10px; opacity:.5;">#000000</div>
    </div>
    <div>
      <div style="height:64px; background:#0A0A0A; border:1px solid rgba(255,255,255,.1);"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--bg-raised</div>
      <div class="mono" style="font-size:10px; opacity:.5;">#0A0A0A</div>
    </div>
    <div>
      <div style="height:64px; background:#FFFFFF;"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--fg</div>
      <div class="mono" style="font-size:10px; opacity:.5;">#FFFFFF</div>
    </div>
    <div>
      <div style="height:64px; background:#BFBFBF;"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--fg-secondary</div>
      <div class="mono" style="font-size:10px; opacity:.5;">#BFBFBF</div>
    </div>
    <div>
      <div style="height:64px; background:#8A8A8A;"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--fg-tertiary</div>
      <div class="mono" style="font-size:10px; opacity:.5;">#8A8A8A</div>
    </div>
    <div>
      <div style="height:64px; background:#5A5A5A;"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--fg-muted</div>
      <div class="mono" style="font-size:10px; opacity:.5;">#5A5A5A</div>
    </div>
    <div>
      <div style="height:64px; background:#000; border:1px solid rgba(255,255,255,.14);"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--border</div>
      <div class="mono" style="font-size:10px; opacity:.5;">14% w</div>
    </div>
    <div>
      <div style="height:64px; background:#000; border:1px solid rgba(255,255,255,.06);"></div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; margin-top:8px; opacity:.85;">--border-soft</div>
      <div class="mono" style="font-size:10px; opacity:.5;">6% w</div>
    </div>
  </div>
</div></body></html>
