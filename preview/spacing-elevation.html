<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:36px 32px;">
  <div class="eyebrow" style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.22em; text-transform:uppercase; opacity:.55;">Elevation · the moon glow</div>
  <div style="display:flex; align-items:center; justify-content:center; gap:48px; padding:24px 0;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div style="width:72px; height:72px; border-radius:50%; background:radial-gradient(circle at 38% 38%, #fff 0%, #d9d9d9 50%, #7a7a7a 100%); box-shadow: 0 0 12px rgba(255,255,255,.45), 0 0 36px rgba(255,255,255,.20), 0 0 96px rgba(255,255,255,.08);"></div>
      <div class="mono" style="font-size:10px; opacity:.55; color:#fff;">--glow-moon</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div style="width:72px; height:72px; border-radius:50%; background:radial-gradient(circle at 38% 38%, #fff 0%, #d9d9d9 50%, #7a7a7a 100%); box-shadow: 0 0 24px rgba(255,255,255,.18);"></div>
      <div class="mono" style="font-size:10px; opacity:.55; color:#fff;">--glow-soft</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <div style="width:72px; height:72px; border-radius:50%; background:radial-gradient(circle at 38% 38%, #fff 0%, #d9d9d9 50%, #7a7a7a 100%);"></div>
      <div class="mono" style="font-size:10px; opacity:.55; color:#fff;">no glow</div>
    </div>
  </div>
  <div style="font-family:'Inter',sans-serif; font-size:12px; opacity:.55; color:#fff; max-width:480px; line-height:1.5;">No drop shadows. Anywhere. The only elevation in the system is the moon's radial bloom.</div>
</div></body></html>
