<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:32px;">
  <div class="eyebrow" style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.22em; text-transform:uppercase; opacity:.55;">Radii · two shapes only</div>
  <div style="display:flex; align-items:flex-end; gap:36px; color:#fff;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:96px; height:96px; background:#fff; border-radius:0;"></div>
      <div class="mono" style="font-size:10px; opacity:.55;">--radius-none · 0</div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.18em; text-transform:uppercase; opacity:.7;">Images · panels</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:160px; height:48px; background:#fff; border-radius:999px; display:flex; align-items:center; justify-content:center; color:#000; font-family:'Jost',sans-serif; font-size:12px; letter-spacing:.22em; text-transform:uppercase; font-weight:400;">Reserve</div>
      <div class="mono" style="font-size:10px; opacity:.55;">--radius-pill · 999px</div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.18em; text-transform:uppercase; opacity:.7;">Buttons · CTAs</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:96px; height:96px; background:#fff; border-radius:50%;"></div>
      <div class="mono" style="font-size:10px; opacity:.55;">--radius-circle · 50%</div>
      <div style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.18em; text-transform:uppercase; opacity:.7;">Sphere · portraits</div>
    </div>
  </div>
</div></body></html>
