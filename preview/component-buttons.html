<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  :root {
    --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
    --dur: 320ms;
  }
  .btn-primary {
    background: #fff; color: #000;
    border: none; border-radius: 999px;
    padding: 13px 30px;
    font-family: 'Jost', sans-serif;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    font-weight: 400; cursor: pointer;
    transition: background var(--dur) var(--ease-out), opacity 150ms var(--ease-out);
  }
  .btn-primary:hover { background: rgba(255,255,255,0.85); }
  .btn-primary:active { opacity: 0.5; }

  .btn-ghost {
    background: transparent; color: #fff;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 999px;
    padding: 12px 28px;
    font-family: 'Jost', sans-serif;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    font-weight: 400; cursor: pointer;
    transition: border-color var(--dur) var(--ease-out), color var(--dur) var(--ease-out), opacity 150ms var(--ease-out);
  }
  .btn-ghost:hover { border-color: #fff; color: #fff; }
  .btn-ghost:active { opacity: 0.5; }

  /* circular carousel-style icon button */
  .btn-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: #000; color: #fff;
    border: 1px solid rgba(255,255,255,0.5);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background var(--dur) var(--ease-out), border-color var(--dur) var(--ease-out), opacity 150ms var(--ease-out);
  }
  .btn-icon:hover { background: #fff; color: #000; border-color: #fff; }
  .btn-icon:active { opacity: 0.6; }

  /* text-link with the brand's opacity-only hover */
  .link {
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: opacity 150ms var(--ease-out);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .link:hover { opacity: 0.55; }
  .link .arrow {
    width: 14px; height: 1px; background: currentColor;
    position: relative;
    transition: width var(--dur) var(--ease-out);
  }
  .link:hover .arrow { width: 26px; }
  .link .arrow::after {
    content: ''; position: absolute; right: 0; top: -3px;
    width: 7px; height: 7px;
    border-top: 1px solid currentColor;
    border-right: 1px solid currentColor;
    transform: rotate(45deg);
  }

  .hint {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.4;
    color: #fff;
  }
</style>
</head>
<body><div class="card" style="padding:32px; gap:20px;">
  <div class="eyebrow" style="font-family:'Jost',sans-serif; font-size:10px; letter-spacing:.22em; text-transform:uppercase; opacity:.55; color:#fff;">Buttons · hover me</div>

  <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap;">
    <button class="btn-primary">Reserve</button>
    <button class="btn-ghost">Learn More</button>
    <button class="btn-icon" aria-label="Previous">
      <svg width="18" height="18" stroke="currentColor" stroke-width="1.25" fill="none" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
    <button class="btn-icon" aria-label="Next">
      <svg width="18" height="18" stroke="currentColor" stroke-width="1.25" fill="none" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>
    <a href="#" class="link">Read More <span class="arrow"></span></a>
  </div>

  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:14px;">
    <div class="hint">Primary — bg lightens</div>
    <div class="hint">Ghost — border brightens</div>
    <div class="hint">Icon — inverts</div>
    <div class="hint">Link — arrow extends</div>
  </div>
</div></body></html>
